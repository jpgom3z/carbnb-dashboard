<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#687ae4">
    <meta name="display" content="standalone">
    <link rel="icon" type="image/png" href="/icons/icon-512.png">
    <title>CarBnB</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="manifest" href="manifest.json">
    <script src="auth.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
      <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
      🌙
    </button>
    <div class="head-logo">
      <img src="icons/transparent-icon-512.png" alt="CarBnB logo">
    </div>

    <div class="header">
      <div class="tab-toggle">
        <button class="tab-btn active" id="tab-deliveries" onclick="switchTab('deliveries')">🚗 Entregas</button>
        <button class="tab-btn" id="tab-returns" onclick="switchTab('returns')">↩️ Devoluciones</button>
      </div>

      <select id="filterSelect" class="filter-dropdown">
        <option value="today">Hoy</option>
        <option value="tomorrow">Mañana</option>
        <option value="week">Próximos 7 días</option>
        <option value="all">Todas pendientes</option>
      </select>

      <button class="refresh-btn" onclick="loadData()">🔄 Actualizar</button>

    </div>
    
    <div id="deliveries-container">
      <div class="loading">
        <div class="spinner"></div>
        <div>Cargando entregas...</div>
      </div>
    </div>
  </body>
</html>
